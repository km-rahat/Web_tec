<html>
    <head>
        <title>
            Student Information
        </title>
        <link rel="Stylesheet" type="text/css" href="lab_Task3.css">
    </head>
    <body>
        <fieldset>
            <legend>
                Student Information
            </legend>
            <table>
             <tr>
                <td>
                    Full Name(Test)
                     
                </td>
                <td class="n1">
                    Email Address
                </td>
            
            </tr>
            <tr>
                <td >
                    <input type="text" name="username" placeholder="Enter Full Name">
                </td>
                <td>
                    <input class="n1" type="email" name="email" placeholder="your eamil@example.com">

                </td>
            </tr>

            <tr>
                <td>Password</td>
                <td class="n1">
                    Age (Number)
                </td>
            </tr>
            <tr>
                <td>
                    <input type="password" name="password" placeholder="Enter secure Password">
                </td>
                <td>
                    <input class="n1" type="number" name="age" placeholder="Enter your age">

                </td>
            
            </tr>
            <tr>
                <td class="exsize">
                    Experiment Date
                </td>
                <td class="n1">
                    Phone Number(Tel)
                </td>
                
            </tr>
            <tr>
                <td>
                    <input class="exsize" type="date" name="date">
                </td>
                <td>
                    <input class="n1" type="phone" name="Phone" placeholder="+880 XXXX XXXXXX">
                </td>
            </tr>
            

            
            
        </table>
        <button class="b1">
                SUBMIT
            </button>
            <button class="b2">
                CLEAR
            </button>
        </fieldset>
        
    </body>
</html>
